# Pi Agent Desktop v2 — pure Electron (no Next sidecar, no bundled Node)
appId: app.dlyzzt.pi-agent-desktop
productName: Pi Agent Desktop
copyright: Copyright © DLYZZT

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json
  - LICENSE
  - build/icon.png
  - build/entitlements.mac.plist
  - "!**/*.map"
  - "!**/*.{md,markdown,ts,tsx}"
  - "!**/*.d.{mts,cts}"
  - "!scripts/**"
  - "!src/**"
  - "!dist/**"
  - "!tsconfig*.json"
  - "!tsup.config.ts"
  - "!vite.config.ts"
  - "!electron-builder.yml"

asar: true

# Signed runtime catalogs plus the current target's small core search tools.
# Managed Node/Python/Git archives remain download-on-consent and are never shipped.
extraResources:
  - from: build/THIRD_PARTY_NOTICES.md
    to: THIRD_PARTY_NOTICES.md
  - from: build/toolchains/runtime-catalog.json
    to: toolchains/runtime-catalog.json
  - from: build/toolchains/core-catalog.json
    to: toolchains/core-catalog.json
  - from: build/toolchains/core/${platform}-${arch}
    to: toolchains/core/${platform}-${arch}

mac:
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  artifactName: Pi-Agent-Desktop-${version}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: Pi-Agent-Desktop-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Pi Agent Desktop

linux:
  executableName: pi-agent-desktop
  # Override electron-builder's unsafe default AppImage argument. Keep Chromium
  # sandboxing enabled and use an app-owned inert launch marker instead.
  executableArgs:
    - --appimage-desktop-launch
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  artifactName: Pi-Agent-Desktop-${version}-${arch}.${ext}
  synopsis: Local desktop UI for the pi coding agent

protocols:
  - name: Pi Agent Desktop
    schemes:
      - pi-agent-desktop

publish:
  provider: github
  owner: DLYZZT
  repo: pi-desktop
  releaseType: draft
