name: Build desktop apps

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  test-platforms:
    name: Tests (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-24.04
          - name: macOS
            runner: macos-15
          - name: Windows
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit and handler tests
        run: npm test

  quality:
    name: Quality gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Electron binary
        run: npx install-electron --no

      - name: Configure Electron sandbox
        run: |
          sudo chown root:root node_modules/electron/dist/chrome-sandbox
          sudo chmod 4755 node_modules/electron/dist/chrome-sandbox

      - name: Run full verification
        run: xvfb-run --auto-servernum npm run verify

  package:
    name: ${{ matrix.name }}
    if: github.ref_type != 'tag' && github.event_name != 'push'
    needs: [quality, test-platforms]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-15
            platform: mac
            targets: dmg zip
            arch: arm64
            artifact: pi-desktop-macos-arm64
          - name: macOS Intel x64
            runner: macos-15-intel
            platform: mac
            targets: dmg zip
            arch: x64
            artifact: pi-desktop-macos-x64
          - name: Windows x64
            runner: windows-2025
            platform: win
            targets: nsis
            arch: x64
            artifact: pi-desktop-windows-x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package ${{ matrix.name }}
        shell: bash
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.targets }} --${{ matrix.arch }} --publish never

      - name: Upload ${{ matrix.name }} artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
            dist/latest*.yaml
            dist/*-mac.yml
          if-no-files-found: error
          retention-days: 14

  release-contract:
    name: Validate release contract
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    needs: [quality, test-platforms]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Verify tag and package versions
        shell: bash
        run: |
          set -euo pipefail
          release_commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$release_commit" origin/main; then
            echo "Release tag must point to a commit contained in main" >&2
            exit 1
          fi

          node <<'NODE'
          const packageJson = require("./package.json");
          const packageLock = require("./package-lock.json");

          if (!/^\d+\.\d+\.\d+$/.test(packageJson.version)) {
            throw new Error(
              `Stable release versions must use x.y.z without a prerelease suffix: ${packageJson.version}`,
            );
          }

          const expectedTag = `v${packageJson.version}`;
          const versions = [
            ["package-lock.json.version", packageLock.version],
            [
              'package-lock.json.packages[""].version',
              packageLock.packages?.[""]?.version,
            ],
          ];

          for (const [source, version] of versions) {
            if (version !== packageJson.version) {
              throw new Error(
                `${source} (${String(version)}) does not match package.json (${packageJson.version})`,
              );
            }
          }

          if (process.env.GITHUB_REF_NAME !== expectedTag) {
            throw new Error(
              `Release tag ${process.env.GITHUB_REF_NAME} must exactly match ${expectedTag}`,
            );
          }

          console.log(`Validated release ${expectedTag}`);
          NODE

      - name: Refuse an existing public release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if is_draft="$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [ "$is_draft" != "true" ]; then
              echo "Release $GITHUB_REF_NAME is already public; published assets are immutable" >&2
              exit 1
            fi
          fi

  release-macos:
    name: Sign and notarize macOS
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    needs: [release-contract]
    runs-on: macos-15
    timeout-minutes: 90
    environment:
      name: release
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build, sign, and notarize macOS
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:mac:notarized -- --arm64 --x64

      - name: Verify both signed and notarized apps
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail

          find_app_for_arch() {
            local expected_arch="$1"
            local app binary
            while IFS= read -r -d '' app; do
              binary="$app/Contents/MacOS/Pi Agent Desktop"
              if [ -f "$binary" ] && lipo -archs "$binary" | grep -qw "$expected_arch"; then
                printf '%s\n' "$app"
                return 0
              fi
            done < <(find dist -maxdepth 3 -type d -name 'Pi Agent Desktop.app' -print0)
            return 1
          }

          verify_app() {
            local app="$1"
            local expected_arch="$2"
            local renderer="$app/Contents/Frameworks/Pi Agent Desktop Helper (Renderer).app"
            local entitlements

            echo "Verifying $expected_arch app: $app"
            codesign --verify --deep --strict --verbose=2 "$app"
            xcrun stapler validate "$app"
            spctl --assess --type execute --verbose=4 "$app"
            codesign -dv --verbose=4 "$app" 2>&1 | grep -Fq "TeamIdentifier=$APPLE_TEAM_ID"
            codesign -dv --verbose=4 "$app" 2>&1 | grep -Fq "Authority=Developer ID Application:"
            entitlements="$(codesign -d --entitlements - "$renderer" 2>&1)"
            grep -q 'com.apple.security.cs.allow-jit' <<<"$entitlements"
          }

          arm64_app="$(find_app_for_arch arm64)"
          x64_app="$(find_app_for_arch x86_64)"
          verify_app "$arm64_app" arm64
          verify_app "$x64_app" x86_64

      - name: Verify packaged macOS update configuration
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          function findUpdateConfigs(directory, matches = []) {
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              const entryPath = path.join(directory, entry.name);
              if (entry.isDirectory()) {
                findUpdateConfigs(entryPath, matches);
              } else if (
                entry.isFile() &&
                entry.name === "app-update.yml" &&
                entryPath
                  .split(path.sep)
                  .join("/")
                  .endsWith(".app/Contents/Resources/app-update.yml")
              ) {
                matches.push(entryPath);
              }
            }
            return matches;
          }

          function readScalar(document, key) {
            const match = document.match(
              new RegExp(`^\\s*${key}\\s*:\\s*([^#\\r\\n]+)`, "mi"),
            );
            if (!match) {
              throw new Error(`Missing ${key}`);
            }

            const value = match[1].trim();
            if (
              (value.startsWith('"') && value.endsWith('"')) ||
              (value.startsWith("'") && value.endsWith("'"))
            ) {
              return value.slice(1, -1);
            }
            return value;
          }

          function verifyUpdateConfig(file) {
            const document = fs.readFileSync(file, "utf8");
            const [expectedOwner, expectedRepo] =
              process.env.GITHUB_REPOSITORY.split("/");
            const expected = {
              provider: "github",
              owner: expectedOwner,
              repo: expectedRepo,
            };

            for (const [key, value] of Object.entries(expected)) {
              const actual = readScalar(document, key);
              if (actual !== value) {
                throw new Error(
                  `${file}: ${key} does not match the expected release repository`,
                );
              }
            }

            const forbidden = [
              [
                "feed override field",
                /^\s*(?:channel|host|protocol|requestHeaders|url)\s*:/im,
              ],
              [
                "credential field",
                /^\s*(?:auth(?:orization)?|headers?|password|passphrase|private[-_]?token|secret|token|(?:api|access)[-_]?key|(?:gh|github)[-_]?token)\s*:/im,
              ],
              [
                "credential-bearing URL",
                /https?:\/\/[^/\s:@]+:[^@\s/]+@/i,
              ],
              [
                "authorization value",
                /\b(?:Basic|Bearer)\s+[A-Za-z0-9+/_.=-]{8,}/i,
              ],
              [
                "GitHub token",
                /\b(?:gh[pousr]_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,})\b/i,
              ],
            ];

            for (const [label, pattern] of forbidden) {
              if (pattern.test(document)) {
                throw new Error(`${file}: contains a forbidden ${label}`);
              }
            }

            console.log(`Validated ${file}`);
          }

          const configs = findUpdateConfigs("dist").sort();
          if (configs.length !== 2) {
            throw new Error(
              `Expected two packaged macOS app-update.yml files, found ${configs.length}`,
            );
          }
          configs.forEach(verifyUpdateConfig);
          NODE

      - name: Verify macOS release artifacts and metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"

          for file in \
            "dist/Pi-Agent-Desktop-${version}-arm64.dmg" \
            "dist/Pi-Agent-Desktop-${version}-arm64.zip" \
            "dist/Pi-Agent-Desktop-${version}-x64.dmg" \
            "dist/Pi-Agent-Desktop-${version}-x64.zip" \
            "dist/latest-mac.yml"; do
            test -s "$file"
          done

          node scripts/verify-update-metadata.mjs \
            dist/latest-mac.yml \
            "$version" \
            "dist/Pi-Agent-Desktop-${version}-arm64.dmg" \
            "dist/Pi-Agent-Desktop-${version}-arm64.zip" \
            "dist/Pi-Agent-Desktop-${version}-x64.dmg" \
            "dist/Pi-Agent-Desktop-${version}-x64.zip"

      - name: Upload signed and notarized macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pi-desktop-macos-release
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

  release-windows:
    name: Package Windows x64
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    needs: [release-contract]
    runs-on: windows-2025
    timeout-minutes: 45
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package Windows x64
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Verify packaged Windows update configuration
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          function findUpdateConfigs(directory, matches = []) {
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              const entryPath = path.join(directory, entry.name);
              if (entry.isDirectory()) {
                findUpdateConfigs(entryPath, matches);
              } else if (
                entry.isFile() &&
                entry.name === "app-update.yml" &&
                /\/win(?:-[^/]+)?-unpacked\/resources\/app-update\.yml$/i.test(
                  `/${entryPath.split(path.sep).join("/")}`,
                )
              ) {
                matches.push(entryPath);
              }
            }
            return matches;
          }

          function readScalar(document, key) {
            const match = document.match(
              new RegExp(`^\\s*${key}\\s*:\\s*([^#\\r\\n]+)`, "mi"),
            );
            if (!match) {
              throw new Error(`Missing ${key}`);
            }

            const value = match[1].trim();
            if (
              (value.startsWith('"') && value.endsWith('"')) ||
              (value.startsWith("'") && value.endsWith("'"))
            ) {
              return value.slice(1, -1);
            }
            return value;
          }

          function verifyUpdateConfig(file) {
            const document = fs.readFileSync(file, "utf8");
            const [expectedOwner, expectedRepo] =
              process.env.GITHUB_REPOSITORY.split("/");
            const expected = {
              provider: "github",
              owner: expectedOwner,
              repo: expectedRepo,
            };

            for (const [key, value] of Object.entries(expected)) {
              const actual = readScalar(document, key);
              if (actual !== value) {
                throw new Error(
                  `${file}: ${key} does not match the expected release repository`,
                );
              }
            }

            const forbidden = [
              [
                "feed override field",
                /^\s*(?:channel|host|protocol|requestHeaders|url)\s*:/im,
              ],
              [
                "credential field",
                /^\s*(?:auth(?:orization)?|headers?|password|passphrase|private[-_]?token|secret|token|(?:api|access)[-_]?key|(?:gh|github)[-_]?token)\s*:/im,
              ],
              [
                "credential-bearing URL",
                /https?:\/\/[^/\s:@]+:[^@\s/]+@/i,
              ],
              [
                "authorization value",
                /\b(?:Basic|Bearer)\s+[A-Za-z0-9+/_.=-]{8,}/i,
              ],
              [
                "GitHub token",
                /\b(?:gh[pousr]_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,})\b/i,
              ],
            ];

            for (const [label, pattern] of forbidden) {
              if (pattern.test(document)) {
                throw new Error(`${file}: contains a forbidden ${label}`);
              }
            }

            console.log(`Validated ${file}`);
          }

          const configs = findUpdateConfigs("dist").sort();
          if (configs.length !== 1) {
            throw new Error(
              `Expected one packaged Windows app-update.yml file, found ${configs.length}`,
            );
          }
          configs.forEach(verifyUpdateConfig);
          NODE

      - name: Verify Windows release artifacts and metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          installer="dist/Pi-Agent-Desktop-Setup-${version}.exe"
          test -s "$installer"
          test "$(find dist -maxdepth 1 -type f -name '*.exe' | wc -l | tr -d ' ')" -eq 1
          test -s dist/latest.yml
          node scripts/verify-update-metadata.mjs dist/latest.yml "$version" "$installer"

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pi-desktop-windows-release
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create desktop draft release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release-macos, release-windows]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download packaged applications
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          files=()
          mac_artifacts="release-artifacts/pi-desktop-macos-release"
          windows_artifacts="release-artifacts/pi-desktop-windows-release"
          test -d "$mac_artifacts"
          test -d "$windows_artifacts"
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find "$mac_artifacts" "$windows_artifacts" -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.blockmap' -o -name '*.yml' -o -name '*.yaml' \) -print0)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files were downloaded" >&2
            exit 1
          fi

          duplicates="$(printf '%s\n' "${files[@]##*/}" | sort | uniq -d)"
          if [ -n "$duplicates" ]; then
            echo "Duplicate release asset names:" >&2
            echo "$duplicates" >&2
            exit 1
          fi

          test "$(find "$mac_artifacts" -type f -name 'latest-mac.yml' | wc -l | tr -d ' ')" -eq 1
          test "$(find "$windows_artifacts" -type f -name '*.exe' | wc -l | tr -d ' ')" -eq 1
          test "$(find "$windows_artifacts" -type f -name '*.exe.blockmap' | wc -l | tr -d ' ')" -eq 1
          test "$(find "$windows_artifacts" -type f -name 'latest.yml' | wc -l | tr -d ' ')" -eq 1

          if is_draft="$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [ "$is_draft" != "true" ]; then
              echo "Release $GITHUB_REF_NAME is already public; published assets are immutable" >&2
              exit 1
            fi

            declare -A expected_assets=()
            for file in "${files[@]}"; do
              expected_assets["${file##*/}"]=1
            done
            while IFS= read -r existing_asset; do
              if [ -n "$existing_asset" ] && [ -z "${expected_assets[$existing_asset]+present}" ]; then
                echo "Removing stale draft asset: $existing_asset"
                gh release delete-asset "$GITHUB_REF_NAME" "$existing_asset" --yes
              fi
            done < <(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name')

            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" --draft --generate-notes --verify-tag
          fi
