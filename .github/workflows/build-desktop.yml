name: Build desktop apps

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full verification
        run: xvfb-run --auto-servernum npm run verify

  package:
    name: ${{ matrix.name }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-15
            platform: mac
            targets: dmg zip
            arch: arm64
            artifact: pi-desktop-macos-arm64
          - name: macOS Intel x64
            runner: macos-15-intel
            platform: mac
            targets: dmg zip
            arch: x64
            artifact: pi-desktop-macos-x64
          - name: Windows x64
            runner: windows-2025
            platform: win
            targets: nsis
            arch: x64
            artifact: pi-desktop-windows-x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package ${{ matrix.name }}
        shell: bash
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.targets }} --${{ matrix.arch }} --publish never

      - name: Upload ${{ matrix.name }} artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
            dist/latest*.yaml
            dist/*-mac.yml
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create draft release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download packaged applications
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          files=()
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find release-artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.blockmap' \) -print0)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files were downloaded" >&2
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" --draft --generate-notes --verify-tag
          fi
